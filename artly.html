<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сайт временно недоступен</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
        }
        .closed-badge {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            border: 2px solid #ff4d4f;
        }
        h1 {
            color: #ff4d4f;
            margin-top: 0;
        }
        p {
            color: #555;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="closed-badge">
        <h1>SITE IS CLOSED</h1>
        <p>Извините, мы проводим технические работы.</p>
        <p>Пожалуйста, зайдите позже.</p>
    </div>

</body>
</html>
